name: Fetch Stock Data

on:
  schedule:
    # Every 15 min during EU+US market hours (8:00-21:00 UTC, Mon-Fri)
    - cron: '*/15 8-20 * * 1-5'
  push:
    paths:
      - 'portfolio.config.json'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Fetch stock data
        run: python scripts/fetch_data.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/portfolio.json
          git diff --staged --quiet || git commit -m "Update stock data [skip ci]"
          git push

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci
      - run: npm run build:encrypt
        env:
          STATICRYPT_PASSWORD: ${{ secrets.APP_PASSWORD }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - id: deployment
        uses: actions/deploy-pages@v4
